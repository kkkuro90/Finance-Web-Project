version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - finance-network

  fulldashboard:
    build:
      context: ./fulldashboard
      dockerfile: Dockerfile
    ports:
      - "81:80"
    depends_on:
      - backend
    networks:
      - finance-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5001
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=financeapp;Username=financeuser;Password=financepass
    depends_on:
      - db
    networks:
      - finance-network

  db:
    image: postgres:15
    restart: always
    environment:
      - POSTGRES_DB=financeapp
      - POSTGRES_USER=financeuser
      - POSTGRES_PASSWORD=financepass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - finance-network

volumes:
  pgdata:

networks:
  finance-network:
    driver: bridge
