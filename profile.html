<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Аккаунт пользователя - Waves</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Боковая панелька -->
        <div class="col-md-3 col-lg-2 sidebar">
            <h1 class="text-center mb-4 sidebar-title">Waves</h1>
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link active sidebar-link" href="#" id="dashboard-tab">
                        <i class="bi bi-speedometer2 me-2"></i> Дашборд
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link sidebar-link" href="#" id="history-tab">
                        <i class="bi bi-clock-history me-2"></i> История
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link sidebar-link" href="#" id="categories-tab">
                        <i class="bi bi-tags me-2"></i> Категория
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link sidebar-link" href="#" id="analytics-tab">
                        <i class="bi bi-graph-up me-2"></i> Финансовый обзор
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link sidebar-link" href="#" id="logout-tab">
                        <i class="bi bi-logout-up me-2"></i> Выйти
                    </a>
                </li>
            </ul>
            <div class="mt-4 p-3 balance-info">
                <h6 class="balance-title">Общий баланс</h6>
                <h3 id="total-balance" class="total-balance">3 250 руб</h3>
                <div class="income-expense">
                    <div class="income">
                        <p>Доход:</p>
                        <span id="total-income">32 500 руб</span>
                    </div>
                    <div class="expense">
                        <p>Расход:</p>
                        <span id="total-expense">29 250 руб</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Инфа о пользователе -->
        <form class="register-form" id="profileInfo">
            <div class="profile-centered">
                <div class="profile-avatar">
                    <img src="https://i.pinimg.com/474x/d5/82/9d/d5829d01f4425addd09920f1b02bd1e4.jpg" alt="Аватар профиля">
                </div>
                <h2 id="profileName">Surname Name</h2>
            </div>
            <p class="profile-text">Логин: User123456</p>
            <p class="profile-text" id="profileEmail">Email: userl@example.com</p>
            <p class="profile-text">Баланс: 100 руб.</p>
            <div class="profile-centered">
                <button type="button" class="primary-button" style="width: 100%; margin-top: 4rem;" id="openSettingsButton">Настройки профиля</button>
            </div>
        </form>

        <!-- Настройки -->
        <div class="settings-modal" id="settingsModal" style="display: none;">
            <div class="modal-content">
                <button class="close-button" id="closeSettingsButton">&times;</button>
                <h2 style="text-align: center;">Настройки профиля</h2>
                <div class="form-group">
                    <label for="name">Имя:</label><br>
                    <input type="text" id="name" placeholder="Ваше имя">
                </div>
                <div class="form-group">
                    <label for="email">Email:</label><br>
                    <input type="email" id="email" placeholder="Ваш email">
                </div>
                <div class="form-group">
                    <label for="password">Новый пароль:</label><br>
                    <input type="password" id="password" placeholder="Новый пароль">
                </div>
                
                <h2 style="text-align: center;">Управление бюджетом</h2>
                <button class="primary-button add-source">Добавить источник дохода</button>
                <button class="primary-button" style="width: 100%;" id="saveSettingsButton">Сохранить изменения</button>
                <button class="primary-button delete-account">Удалить аккаунт</button>
            </div>
        </div>
    </div>
</body>
</html>
